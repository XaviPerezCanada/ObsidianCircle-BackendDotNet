version: '3.8'

services:
  # --- SERVIDOR 1: SQL SERVER ---
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver_ludoteca
    restart: always
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=TuPasswordFuerte123!
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  # --- SERVIDOR 2: POSTGRESQL ---
  postgres:
    image: postgres:16
    container_name: postgres_ludoteca
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=TuPasswordFuerte123!
      - POSTGRES_DB=LudotecaDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  sqlserver_data:
  postgres_data: